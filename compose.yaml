services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 16g
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama-init:
    image: ollama/ollama
    entrypoint: ["/bin/ollama"]
    command: ["pull", "gemma4:e2b"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

  pipeline:
    build: .
    env_file: .env
    environment:
      # Override localhost (valid for local runs) with the Docker service name.
      LLM_BASE_URL: http://ollama:11434/v1
    volumes:
      - ./data:/app/data
    depends_on:
      ollama-init:
        condition: service_completed_successfully

volumes:
  ollama_data:
